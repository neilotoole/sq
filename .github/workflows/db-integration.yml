name: DB integration

on:
  workflow_call:
    inputs:
      selection:
        description: "JSON object {engine:[tags]} of engines/tags to test"
        required: true
        type: string
      scope:
        description: "full (go test ./...) or narrow (per-engine packages)"
        required: false
        default: "full"
        type: string
  workflow_dispatch:
    inputs:
      # Default "" so a blank engine is skipped (see the select(.value != "")
      # filter in build-db-matrix.sh). "Run everything at :latest" is the
      # nightly scheduler's job; a manual dispatch names the engines it wants.
      postgres: { description: "postgres tags (comma-sep; blank=skip)", type: string, default: "" }
      mysql: { description: "mysql tags (comma-sep; blank=skip)", type: string, default: "" }
      sqlserver: {
        description: "sqlserver tags (comma-sep; blank=skip)",
        type: string,
        default: "",
      }
      clickhouse: {
        description: "clickhouse tags (comma-sep; blank=skip)",
        type: string,
        default: "",
      }
      oracle: { description: "oracle tags (comma-sep; blank=skip)", type: string, default: "" }
      rqlite: { description: "rqlite tags (comma-sep; blank=skip)", type: string, default: "" }
      scope: { description: "full or narrow", type: choice, options: [full, narrow], default: full }

env:
  BUILD_TAGS: "sqlite_vtable sqlite_stat4 sqlite_fts5 sqlite_introspect sqlite_json sqlite_math_functions"
  # Single source of truth for the sakiladb registry. GHCR isn't subject to
  # Docker Hub's anonymous pull rate limits (easily tripped from shared runner
  # IPs) and mirrors the same images with identical digests. build-db-matrix.sh
  # reads it and stamps each matrix entry's `image` ref; the test service and
  # dedup-db-matrix.sh then both consume that ref, so the registry lives here only.
  SAKILADB_REGISTRY: ghcr.io/sakiladb

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - id: build
        shell: bash
        env:
          INPUT_POSTGRES: ${{ inputs.postgres   || github.event.inputs.postgres }}
          INPUT_MYSQL: ${{ inputs.mysql      || github.event.inputs.mysql }}
          INPUT_SQLSERVER: ${{ inputs.sqlserver  || github.event.inputs.sqlserver }}
          INPUT_CLICKHOUSE: ${{ inputs.clickhouse || github.event.inputs.clickhouse }}
          INPUT_ORACLE: ${{ inputs.oracle     || github.event.inputs.oracle }}
          INPUT_RQLITE: ${{ inputs.rqlite     || github.event.inputs.rqlite }}
          INPUT_SELECTION: ${{ inputs.selection }}
          INPUT_SCOPE: ${{ inputs.scope || github.event.inputs.scope || 'full' }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SELECTION" ]; then
            # Invoked via workflow_call (e.g. db-scheduled.yml): use the selection JSON.
            sel="$INPUT_SELECTION"
          else
            # Direct workflow_dispatch: build the selection from per-engine tag inputs.
            sel=$(jq -cn \
              --arg postgres   "$INPUT_POSTGRES" \
              --arg mysql      "$INPUT_MYSQL" \
              --arg sqlserver  "$INPUT_SQLSERVER" \
              --arg clickhouse "$INPUT_CLICKHOUSE" \
              --arg oracle     "$INPUT_ORACLE" \
              --arg rqlite     "$INPUT_RQLITE" '
              {postgres:$postgres, mysql:$mysql, sqlserver:$sqlserver,
               clickhouse:$clickhouse, oracle:$oracle, rqlite:$rqlite}
              | to_entries | map(select(.value != ""))
              | map({key:.key, value:(.value | split(","))}) | from_entries')
          fi
          scope="$INPUT_SCOPE"
          # dedup-db-matrix.sh collapses tags that resolve to the same image
          # (e.g. a dispatch naming both "latest" and "18" for postgres) so the
          # image is tested once, not twice. It's best-effort: an unresolvable
          # digest leaves the entry in place rather than dropping coverage.
          inc=$(scripts/build-db-matrix.sh "$scope" "$sel" | scripts/dedup-db-matrix.sh)
          matrix="{\"include\":$inc}"
          echo "::notice::scope=$scope selection=$sel"
          echo "::notice::matrix=$matrix"
          # Fail loudly rather than silently skipping the test job: an empty
          # selection means nothing would run, which otherwise reports a false
          # green (a skipped matrix job is not a failure).
          if [ "$(jq 'length' <<<"$inc")" -eq 0 ]; then
            echo "::error::Empty engine selection — nothing to test. Provide at least one engine tag (dispatch) or a non-empty selection (call)."
            exit 1
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test:
    needs: setup
    if: ${{ fromJSON(needs.setup.outputs.matrix).include[0] != null }}
    # Concise name; without this the matrix auto-appends every include field
    # (image, port, env, packages) to the job title.
    name: test ${{ matrix.engine }}:${{ matrix.tag }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port }}:${{ matrix.port }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # scope=full runs `go test ./...`, whose embedded SQLite/DuckDB temp
      # databases can exhaust the runner's ~14 GB root filesystem (each leg runs
      # the full suite on its own runner, so this bites single-version nightlies
      # too, not just multi-version dispatches). Reclaim space from preinstalled
      # toolchains we never use. Not needed for scope=narrow.
      - name: Free disk space
        if: ${{ (inputs.scope || github.event.inputs.scope || 'full') == 'full' }}
        shell: bash
        run: |
          set -euo pipefail
          before=$(df -BG --output=avail / | tail -1 | tr -dc '0-9')
          sudo rm -rf \
            /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift
          after=$(df -BG --output=avail / | tail -1 | tr -dc '0-9')
          echo "Freed disk on /: ${before}G -> ${after}G available"

      - name: Wait for DB healthy
        shell: bash
        run: |
          set -euo pipefail
          cid='${{ job.services.db.id }}'
          for i in $(seq 1 60); do
            status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid")
            echo "attempt $i: $status"
            if [ "$status" = healthy ]; then exit 0; fi
            if [ "$status" = none ]; then echo "image has no HEALTHCHECK; proceeding"; exit 0; fi
            sleep 5
          done
          echo "::error::DB ${{ matrix.engine }}:${{ matrix.tag }} did not become healthy"
          docker logs "$cid" | tail -100 || true
          exit 1

      - name: Build
        run: go build -tags '${{ env.BUILD_TAGS }}' ./...

      - name: Integration tests (${{ matrix.engine }}:${{ matrix.tag }})
        shell: bash
        env:
          ENGINE: ${{ matrix.engine }}
          ENV_NAME: ${{ matrix.env }}
        run: |
          set -euo pipefail
          # Look up the DSN from the manifest at runtime — it carries credentials
          # that GitHub masks, so it must not travel through the job-output matrix.
          dsn=$(jq -r --arg e "$ENGINE" '.[$e].dsn' .github/sakila-db.json)
          export "$ENV_NAME=$dsn"
          go test -tags '${{ env.BUILD_TAGS }}' -timeout 25m -v ${{ matrix.packages }}
