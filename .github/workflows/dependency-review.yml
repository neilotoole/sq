# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request, surfacing known-vulnerable versions of the packages declared or updated in the PR. Once installed, if the workflow run is marked as required, PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
# Public documentation: https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review#dependency-review-enforcement
name: 'Dependency Review'
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'sq.json' # This is updated by scoop; no need to run a new build
      - '.github/**'

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v5
        with:
          # Allowlisted advisories (keep the default low-severity gate for
          # everything else):
          #
          # - GHSA-q7pp-wcgr-pffx: github.com/disintegration/imaging@1.6.2
          #   (a transitive dependency of github.com/goccy/go-graphviz, used by
          #   the png-erd/svg-erd inspect formats). It's a low-severity crash on
          #   a maliciously crafted TIFF, and v1.6.2 is the latest release of an
          #   unmaintained library, so there's no fixed version to upgrade to.
          #   sq only *encodes* PNG/SVG via go-graphviz and never decodes TIFF,
          #   so the vulnerable path is unreachable.
          allow-ghsas: GHSA-q7pp-wcgr-pffx
