# Repo-wide formatting + JS lint gate.
#
# dprint owns formatting for markdown, JSON, YAML, TOML, SCSS/CSS, Go (gofumpt
# plugin), and site JS; Biome lints site JS (replacing eslint). This single
# workflow gates all of it, including docs-only and site-only PRs that main.yml
# skips (it ignores **.md and site/**). Replaces the old markdownlint workflow.
name: Format

on:
  push:
    branches: [master, develop]
    paths:
      - "**/*.md"
      - "**/*.go"
      - "**/*.json"
      - "**/*.jsonc"
      - "**/*.toml"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.scss"
      - "**/*.css"
      - "**/*.js"
      - "dprint.json"
      - "biome.json"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/format.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "**/*.md"
      - "**/*.go"
      - "**/*.json"
      - "**/*.jsonc"
      - "**/*.toml"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.scss"
      - "**/*.css"
      - "**/*.js"
      - "dprint.json"
      - "biome.json"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/format.yml"

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Keep in sync with site-ci.yml bun-version.
          bun-version: 1.3.13

      - name: Cache Bun download cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-fmt-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-fmt-bun-

      - name: Cache dprint plugins
        uses: actions/cache@v5
        with:
          path: ~/.cache/dprint
          key: ${{ runner.os }}-dprint-${{ hashFiles('dprint.json') }}
          restore-keys: |
            ${{ runner.os }}-dprint-

      - name: Install tooling
        run: bun install --frozen-lockfile

      - name: dprint check
        run: bunx dprint check

      - name: Biome lint (site JS)
        run: bunx biome lint
