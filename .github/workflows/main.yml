name: Main Pipeline
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'sq.json' # Updated by scoop; no need to run a new build.
      - 'site/**'
  push:
    # No paths-ignore on push: master merges and release tags must always run
    # (paths filtering on tag pushes is unreliable and could skip a release).
    branches: [master]
    tags: ['v*']
  schedule:
    - cron: '17 9 * * *' # Nightly full suite vs master (UTC; tunable).

  # Allows this workflow to be manually triggered from the Actions tab.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: >-
    ${{ github.ref != 'refs/heads/master'
        && !startsWith(github.ref, 'refs/tags/v') }}

env:
  GORELEASER_VERSION: 2.13.3
  GOLANGCI_LINT_VERSION: v2.9.0
  TPARSE_VERSION: v0.18.0
  BUILD_TAGS: 'sqlite_vtable sqlite_stat4 sqlite_fts5 sqlite_introspect sqlite_json sqlite_math_functions'

jobs:
  test-nix:
    strategy:
      matrix:
        os: [ ubuntu-24.04, macos-15]

    runs-on: ${{ matrix.os }}

    env:
      # Full run (no -short, with coverage) nightly, on release tags, and on
      # manual dispatch. The PR/master dev loop runs -short without coverage,
      # skipping long-running tests (e.g. large-fixture JSON/XLSX ingest).
      FULL_RUN: ${{ github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod


      - name: Build
        run: go build -tags '${{ env.BUILD_TAGS }}' -v ./...

      - name: 'Go tests'
        shell: bash
        run: |
          # pipefail so a `go test` failure isn't masked by the `| tee` below.
          set -eo pipefail

          test_args=()
          cover_args=()
          if [ "${FULL_RUN}" = "true" ]; then
            # Full run: instrument coverage on the ubuntu-24.04 runner only
            # (uploaded to Codecov below); macOS runs without coverage.
            # "-coverpkg=./..." attributes coverage across all packages (e.g.
            # integration tests exercising other packages).
            if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
              cover_args=(-cover -coverpkg=./... -coverprofile=coverage.out)
            fi
          else
            # Dev loop (PRs, master merges): skip long-running tests. The full
            # suite runs nightly and on release tags.
            test_args=(-short)
          fi

          go test -tags '${{ env.BUILD_TAGS }}' -timeout 20m -v -json \
            "${test_args[@]}" "${cover_args[@]}" ./... | tee gotest.out.json

      - name: 'Test output'
        if: always()
        shell: bash
        run: |
          set -e
          go install github.com/mfridman/tparse@${{ env.TPARSE_VERSION }}
          tparse -all -sort=elapsed -file gotest.out.json

      - name: Upload coverage to Codecov
        if: always() && matrix.os == 'ubuntu-24.04' && env.FULL_RUN == 'true'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: ./coverage.out
          flags: ${{ matrix.os }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false


  test-windows-smoke:
    # Fast Windows check for the dev loop: compile everything (catches
    # CGO/SQLite breakage) and run only the focused smoke suite. Runs on every
    # PR and on master merges; the full suite runs nightly and on release tags.
    if: >-
      github.event_name == 'pull_request'
      || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -tags '${{ env.BUILD_TAGS }}' -v ./...

      - name: Smoke tests
        run: go test -tags '${{ env.BUILD_TAGS }}' -timeout 10m -v ./test/smoke/...

  test-windows-full:
    # Full Windows suite. Runs nightly against master, on release tags (it
    # gates publish), and on manual dispatch — not on PRs or master merges,
    # which get the fast smoke check above.
    if: >-
      startsWith(github.ref, 'refs/tags/v')
      || github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    runs-on: windows-2022
    steps:
    # Copied from https://github.com/mattn/go-sqlite3/blob/master/.github/workflows/go.yaml#L73
#    - uses: msys2/setup-msys2@v2
#      with:
#        update: true
#        install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-sqlite3
#        msystem: MINGW64
#        path-type: inherit

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Build
      run: go build -tags '${{ env.BUILD_TAGS }}' -v ./...
#      shell: msys2 {0}

#    - name: Run tests
#      run: |
#        go test -tags '${{ env.BUILD_TAGS }}' -v ./...
##      shell: msys2 {0}

    - name: 'Go tests'
      shell: bash
      run: |
        # set -e

        # We send the Go test output to a file, so that "tparse" can
        # render pretty output below.
        go test -tags '${{ env.BUILD_TAGS }}' -timeout 20m -v -json ./... > gotest.out.json

    - name: 'Test output'
      if: always()
      shell: bash
      run: |
        set -e
        go install github.com/mfridman/tparse@${{ env.TPARSE_VERSION }}
        tparse -all -sort=elapsed -file gotest.out.json

  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Lint GH workflow files
        run: |
          # From https://github.com/rhysd/actionlint
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      - name: shellcheck
        run: |
          shellcheck ./install.sh

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          skip-cache: true
          install-mode: 'binary'
          version: ${{ env.GOLANGCI_LINT_VERSION }}


  binaries-darwin:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: GoReleaser (build darwin binaries)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser-pro
          version: ${{ env.GORELEASER_VERSION }}
          args: build --skip=validate --clean -f .goreleaser-darwin.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Upload assets (darwin)
        uses: actions/upload-artifact@v7
        with:
          name: dist-darwin
          path: dist-darwin

  binaries-linux-amd64:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: GoReleaser (build linux-amd64 binaries)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser-pro
          version: ${{ env.GORELEASER_VERSION }}
          args: build --skip=validate --clean -f .goreleaser-linux-amd64.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Upload assets (linux-amd64)
        uses: actions/upload-artifact@v7
        with:
          name: dist-linux-amd64
          path: dist-linux

  binaries-linux-arm64:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install toolchain dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: GoReleaser (build linux-arm64 binaries)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser-pro
          version: ${{ env.GORELEASER_VERSION }}
          args: build --skip=validate --clean -f .goreleaser-linux-arm64.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Upload assets (linux-arm64)
        uses: actions/upload-artifact@v7
        with:
          name: dist-linux-arm64
          path: dist-linux


  binaries-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: GoReleaser (build windows binaries)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser-pro
          version: ${{ env.GORELEASER_VERSION }}
          args: build --skip=validate --clean -f .goreleaser-windows.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}


      - name: Upload assets (windows)
        uses: actions/upload-artifact@v7
        with:
          name: dist-windows
          path: dist-windows

  publish:
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - lint
      - test-nix
      - test-windows-full
      - binaries-darwin
      - binaries-linux-amd64
      - binaries-linux-arm64
      - binaries-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download darwin artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-darwin
          path: dist-darwin

      - name: Download linux-amd64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-linux-amd64
          path: dist-linux

      - name: Download linux-arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-linux-arm64
          path: dist-linux

      - name: Download windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-windows
          path: dist-windows


      - name: GoReleaser (publish)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser-pro
          version: ${{ env.GORELEASER_VERSION }}
          args: release -f .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
          AUR_PRIVATE_KEY: ${{ secrets.AUR_PRIVATE_KEY }}

  docker-publish:
    # Build and push the Docker image to ghcr.io. Runs as a sibling of
    # `publish` (gated by the same lint/test jobs, plus the linux binary builds
    # it consumes), not behind test-install — so the image ships alongside
    # every other release artifact and is never withheld by an unrelated
    # install-test failure on some other platform. GoReleaser builds the image
    # from the linux release binaries (.goreleaser-docker.yml +
    # packages/docker/alpine.Dockerfile), so the image always matches this
    # exact release. test-install smoke-tests the published image afterward.
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - lint
      - test-nix
      - test-windows-full
      - binaries-linux-amd64
      - binaries-linux-arm64
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing via sigstore/fulcio.
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download linux-amd64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-linux-amd64
          path: dist-linux

      - name: Download linux-arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-linux-arm64
          path: dist-linux

      # Add support for more platforms with QEMU; needed to build the
      # linux/arm64 image on the amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log into registry ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser (docker publish)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser-pro
          version: ${{ env.GORELEASER_VERSION }}
          args: release -f .goreleaser-docker.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

  test-install:
    # Verify that install mechanisms work across the supported platforms,
    # including the Docker image. Runs *after* both publish and docker-publish,
    # so every release channel is already live by the time it runs — it gates
    # nothing. A failure here means users are already hitting the problem, so
    # fix it ASAP; this is a post-publish canary, not a pre-publish guard.
    needs:
      - publish
      - docker-publish
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/test-install.yml
