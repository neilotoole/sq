# Lint repo markdown (root, skills/, driver/cli/libsq READMEs) with
# markdownlint-cli2. site/ markdown is linted separately by site-ci.yml.
# main.yml ignores **.md, so docs-only PRs need this dedicated workflow.
name: Markdown Lint

on:
  push:
    branches: [master, develop]
    paths:
      - "**/*.md"
      - "!site/**"
      - ".markdownlint-cli2.yaml"
      - "skills/.markdownlint-cli2.yaml"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/markdown-lint.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "**/*.md"
      - "!site/**"
      - ".markdownlint-cli2.yaml"
      - "skills/.markdownlint-cli2.yaml"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/markdown-lint.yml"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Keep in sync with site-ci.yml bun-version.
          bun-version: 1.3.13

      - name: Cache Bun download cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-md-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-md-bun-

      - name: Lint markdown (make lint-markdown)
        run: make lint-markdown
