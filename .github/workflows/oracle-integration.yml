# Manual Oracle integration tests against sakiladb/oracle (pure Go driver).

name: Oracle integration

on:
  workflow_dispatch:

env:
  BUILD_TAGS: 'sqlite_vtable sqlite_stat4 sqlite_fts5 sqlite_icu sqlite_introspect sqlite_json sqlite_math_functions'

jobs:
  oracle:
    runs-on: ubuntu-24.04
    services:
      oracle:
        image: sakiladb/oracle:23
        ports:
          - 1521:1521

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Wait for Oracle listener
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 120); do
            if nc -z localhost 1521 2>/dev/null; then
              echo "listener ready (${i})"
              break
            fi
            sleep 5
          done
          nc -z localhost 1521
          echo "Extra settle time for PDB..."
          sleep 90

      - name: Oracle driver integration tests
        shell: bash
        env:
          SQ_TEST_SRC__SAKILA_OR23: localhost
          SQ_TEST_ORACLE_DSN: oracle://sakila:p_ssW0rd@localhost:1521/SAKILA
        run: |
          set -euo pipefail
          go test -tags '${{ env.BUILD_TAGS }}' -timeout 20m -v \
            ./drivers/oracle/... \
            ./libsq/driver/... \
            -run 'Oracle|SourceMetadata_Oracle'
