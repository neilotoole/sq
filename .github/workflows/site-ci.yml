# Lint and build the sq.io static site (Hugo + Bun) under site/
name: Site CI

on:
  push:
    branches: [master, develop]
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            site/node_modules
          key: ${{ runner.os }}-site-bun-${{ hashFiles('site/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-site-bun-

      - name: Install, lint, and build (make ci)
        run: make ci

      # Full external link crawl is valuable but inherently flaky (third-party
      # availability, rate limits, CI network slices). Keep PR merges gated on
      # `make ci` (stable: scripts/styles/markdown + internal linkinator scope),
      # but still surface external reachability problems in CI logs.
      - name: Full external link check (informational)
        continue-on-error: true
        run: bun run lint:links
