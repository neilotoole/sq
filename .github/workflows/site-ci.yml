# Lint and build the sq.io static site (Hugo + Bun) under site/
name: Site CI

on:
  push:
    branches: [master, develop]
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            site/node_modules
          key: ${{ runner.os }}-site-bun-${{ hashFiles('site/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-site-bun-

      - name: Install dependencies
        run: make deps

      - name: Lint scripts, styles, markdown
        run: |
          bun run lint:scripts
          bun run lint:styles
          bun run lint:markdown

      # Link check is non-fatal: external URLs intermittently report status [0]
      # (request did not complete) under bursty CI network conditions, even
      # for healthy public sites. Surface failures as a warning rather than
      # blocking the PR. Plan is to move this check to a nightly cron run.
      - name: Link check (non-fatal)
        continue-on-error: true
        run: bun run lint:links

      - name: Build site
        run: make site-build
