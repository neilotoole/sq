# Lint and build the sq.io static site (Hugo + Bun) under site/
name: Site CI

on:
  push:
    branches: [master, develop, feature/import-sq-web]
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"
  pull_request:
    branches: [master, develop, feature/import-sq-web]
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install, lint, and build (make ci)
        run: make ci
