# Nightly refresh of site/data/github.toml (latest sq version + GitHub stars).
#
# Runs the same generator as the site build, then commits the refreshed data
# file to master IF a value changed. A push to master triggers Site CI only
# (build, no production deploy). Production publishes happen via
# site-publish-dispatch.yml (manual) or site-publish-release.yml (stable release).
#
# Prerequisite: master uses classic branch protection (required PR reviews,
# enforce_admins=false), which has no per-app bypass — the built-in GITHUB_TOKEN
# (github-actions[bot]) is not an admin and cannot push directly. So the push
# uses the SITE_DATA_PUSH_TOKEN secret: a personal access token from a repo admin
# (fine-grained, Contents: read and write on neilotoole/sq). An admin's push
# bypasses the PR requirement because enforce_admins is false. Without the secret,
# the workflow succeeds through the build and fails only at `git push`.
#
# Note: a push authenticated with a PAT (unlike the built-in GITHUB_TOKEN) does
# re-trigger workflows, so the resulting master push will run Site CI (build, no
# deploy) — harmless and expected.
name: Site data (nightly)

on:
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC
  workflow_dispatch:

# Only the read-only version/stars fetch uses the built-in token; the git push
# is authenticated by the SITE_DATA_PUSH_TOKEN PAT, not GITHUB_TOKEN.
permissions:
  contents: read

concurrency:
  group: site-data-nightly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Persist the admin PAT so the later `git push` authenticates as its
          # owner and bypasses master's PR requirement (enforce_admins=false).
          token: ${{ secrets.SITE_DATA_PUSH_TOKEN }}

      - name: Set up Bun
        # Same pinned action + version as site-ci.yml / site-publish-dispatch.yml.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Refresh data/github.toml
        working-directory: site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # The generator uses only Node built-ins + global fetch, so no bun install.
        run: bun scripts/gen-site-data.js

      - name: Commit and push if changed
        working-directory: site
        run: |
          set -euo pipefail
          if git diff --quiet -- data/github.toml; then
            echo "data/github.toml unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github.toml
          git commit -m "site(version): refresh github.toml (nightly)"
          git push
