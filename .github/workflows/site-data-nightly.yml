# Nightly refresh of site/data/github.toml (latest sq version + GitHub stars).
#
# Runs the same generator as the site build, then commits the refreshed data
# file to master IF a value changed. This does NOT deploy — production publishes
# happen only via the manual Site Publish (dispatch) workflow; pushing to master
# does not trigger a Netlify production build (it is suppressed in netlify.toml).
#
# Prerequisite: master is review-gated, so the Actions bot must be allowed to
# bypass the branch ruleset's pull-request requirement (Settings -> Rules ->
# add a bypass for the repository's GitHub Actions). Commits pushed with the
# built-in GITHUB_TOKEN do not re-trigger workflows, so there is no CI loop.
# Alternative: store an admin PAT secret and use it for checkout + push.
name: Site data (nightly)

on:
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-data-nightly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        # Same pinned action + version as site-ci.yml / site-publish-dispatch.yml.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Refresh data/github.toml
        working-directory: site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # The generator uses only Node built-ins + global fetch, so no bun install.
        run: bun scripts/gen-site-data.js

      - name: Commit and push if changed
        working-directory: site
        run: |
          set -euo pipefail
          if git diff --quiet -- data/github.toml; then
            echo "data/github.toml unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github.toml
          git commit -m "site(version): refresh github.toml (nightly)"
          git push
