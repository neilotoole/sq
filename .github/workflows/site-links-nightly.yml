# Nightly external link crawl for sq.io (Hugo + Bun) under site/
name: Site Links (nightly)

on:
  schedule:
    # Daily at 07:15 UTC — offset from on-the-hour spikes.
    - cron: "15 7 * * *"
  workflow_dispatch:

defaults:
  run:
    working-directory: site

jobs:
  links:
    runs-on: ubuntu-latest
    # Headroom for the external crawl's per-attempt timeout x retry budget
    # (see site/linkinator.sh: LINKINATOR_ATTEMPT_TIMEOUT x LINKINATOR_MAX_ATTEMPTS).
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Keep in sync with site/netlify.toml `BUN_VERSION`.
          bun-version: 1.3.13

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            site/node_modules
          key: ${{ runner.os }}-site-bun-${{ hashFiles('site/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-site-bun-

      - name: Install dependencies
        run: make deps

      - name: Full external link crawl
        run: bun run lint:links
