# Manually publish the sq.io site to Netlify production (escape hatch).
#
# Routine publishes happen automatically via site-publish-production.yml
# after Site CI succeeds on master when site/** changes. Use this workflow
# to deploy from a branch or SemVer tag without merging, or to republish an
# older ref. Netlify git integration remains suppressed (production ignore).
#
# PR deploy previews from Netlify are unaffected — they run from the
# `deploy-preview` context, not `production`.
#
# Required repo secrets (configure under Settings → Secrets and variables →
# Actions):
#   NETLIFY_AUTH_TOKEN   Personal access token with deploy rights on the
#                        `sq-web` Netlify site.
#   NETLIFY_SITE_ID      Netlify site ID for `sq-web` (the UUID, not the
#                        slug).
name: Site Publish (dispatch)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production publish to https://sq.io'
        required: true
        type: string
      message:
        description: 'Optional deploy message (shown in the Netlify deploy log)'
        required: false
        type: string

# Serialize production publishes. Two overlapping `--prod` deploys would
# race on the production alias (last writer wins); queueing the second run
# behind the first keeps the final state predictable. `cancel-in-progress`
# is intentionally false — both runs should complete in order, never be
# discarded mid-deploy.
concurrency:
  group: site-publish-production
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    environment:
      name: production
      url: https://sq.io
    steps:
      # Allow publishes from any branch (`refs/heads/*`) or any SemVer-style
      # v-tag — `vMAJOR.MINOR.PATCH` with optional pre-release (`-alpha`,
      # `-rc.1`, etc.) and/or build metadata (`+build.123`). Reject anything
      # else (e.g. non-version tags like `latest`, `stable`, or a `v`-prefixed
      # word like `vacation`). The typed `DEPLOY` confirmation below is the
      # real fat-finger guard; this step is just a coarse sanity check on
      # the ref shape, hence a permissive SemVer regex rather than a strict
      # spec-compliant one.
      - name: Reject unsupported refs
        env:
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "${REF}" == refs/heads/* ]]; then
            echo "Accepting branch ref."
            exit 0
          fi
          if [[ "${REF}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Accepting SemVer v-tag."
            exit 0
          fi
          echo "::error::This workflow can only publish from a branch or a SemVer-style v-tag (vMAJOR.MINOR.PATCH, with optional pre-release/build metadata)."
          exit 1

      - name: Validate confirmation input
        if: inputs.confirm != 'DEPLOY'
        run: |
          echo "::error::Confirmation input must be exactly 'DEPLOY'."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Pin to the exact version Netlify uses for deploy previews
          # (site/netlify.toml `BUN_VERSION`) so the manually-published
          # production artifact matches what reviewers saw on preview.
          bun-version: 1.3.13

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            site/node_modules
          key: ${{ runner.os }}-site-bun-${{ hashFiles('site/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-site-bun-

      # `make ci` runs deps, lint, and a production build into site/public.
      # We intentionally re-run lint here rather than trusting Site CI: a
      # manual publish should never bypass the gates that block PR merges.
      - name: Install, lint, and build (make ci)
        working-directory: site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make ci

      - name: Publish site/public to Netlify (production)
        working-directory: site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          INPUT_MESSAGE: ${{ inputs.message }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_MESSAGE:-}" ]; then
            DEPLOY_MESSAGE="${INPUT_MESSAGE}"
          else
            DEPLOY_MESSAGE="Manual publish via workflow_dispatch by @${ACTOR} (${SHA})"
          fi
          ./scripts/netlify-deploy-prod.sh "${DEPLOY_MESSAGE}"

      - name: Post-deploy smoke (sq.io)
        working-directory: site
        run: ./scripts/smoke-production.sh https://sq.io
