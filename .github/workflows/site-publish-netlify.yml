# Shared build, Netlify production upload, and post-deploy smoke for sq.io.
#
# Called by site-publish-dispatch.yml (manual) and site-publish-release.yml
# (stable GitHub release). Requires NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID.
name: Site Publish to Netlify

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout (branch, tag, or SHA)
        required: true
        type: string
      deploy_message:
        description: Message shown in the Netlify deploy log
        required: true
        type: string
    secrets:
      NETLIFY_AUTH_TOKEN:
        required: true
      NETLIFY_SITE_ID:
        required: true
concurrency:
  group: site-publish-production
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    environment:
      name: production
      url: https://sq.io
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Pin to site/netlify.toml BUN_VERSION so production matches deploy previews.
          bun-version: 1.3.13

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.bun/install/cache
            site/node_modules
          key: ${{ runner.os }}-site-bun-${{ hashFiles('site/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-site-bun-

      - name: Install, lint, build, and validate artifact (make ci)
        working-directory: site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make ci

      - name: Publish site/public to Netlify (production)
        working-directory: site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: ./scripts/netlify-deploy-prod.sh "${{ inputs.deploy_message }}"

      - name: Post-deploy smoke (sq.io)
        working-directory: site
        run: ./scripts/smoke-production.sh https://sq.io
