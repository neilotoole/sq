# This workflow tests the various sq install mechanisms.
name: Test Install
on:
  workflow_call:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  docker:
    # Smoke-test the just-published ghcr.io/neilotoole/sq image. docker-publish
    # ships the image alongside the rest of the release, so by the time this
    # runs the image must be pullable and report this exact version. The pull
    # is anonymous (no docker login) by design: the image is meant to be
    # public, so a 401/manifest-unknown here also catches an accidental
    # package-visibility regression — a real failure worth surfacing.
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Test Docker image
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          image="ghcr.io/neilotoole/sq:${REF_NAME}"
          # Pull explicitly so a missing/unpullable image fails here clearly.
          docker pull "$image"
          # entrypoint.sh exec's its args, so pass the full `sq version` command.
          got="$(docker run --rm "$image" sq version | awk '{print $2}')"
          if [ "$got" != "$REF_NAME" ]; then
            echo "Expected sq $REF_NAME but got: $got"
            exit 1
          fi
          echo "OK: Docker image $image reports $got"

  macos-brew:
    # Pin the macOS version: macos-latest migrates to macOS 26 from 2026-06-15.
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      # Silence brew's generic env hints, and skip the auto-update step that
      # scans the runner's preinstalled third-party taps (aws/tap, azure/bicep)
      # and emits "not trusted" warnings unrelated to sq.
      HOMEBREW_NO_ENV_HINTS: "1"
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@6eaeff80e7e5c43087c0e5eb5aa82120399e9c91 # master

      - name: Test brew
        shell: bash
        run: |
          set -e pipefail
          brew install neilotoole/sq/sq
          if [ "$(sq version | awk '{print $2}')" != "${{github.ref_name}}" ]; then
            echo "Expected sq ${{github.ref_name}} but got: $(sq version)"
            exit 1
          fi

  # Disabling macos-install-sh for now, because install.sh now uses the brew core
  # sq formula, instead of the neilotoole/sq/sq formula. The brew core formula is
  # updated by the brew maintainers, so it won't be available at the time this job runs.

  #  macos-install-sh:
  #    runs-on: macos-15
  #    if: startsWith(github.ref, 'refs/tags/v')
  #    steps:
  #      - name: Set up Homebrew
  #        uses: Homebrew/actions/setup-homebrew@master
  #
  #      - name: Test install.sh
  #        shell: bash
  #        run: |
  #          set -e pipefail
  #          /bin/sh -c "$(curl -fsSL https://sq.io/install.sh)"
  #          if [ "$(sq version | awk '{print $2}')" != "${{github.ref_name}}" ]; then
  #            echo "Expected sq ${{github.ref_name}} but got: $(sq version)"
  #            exit 1
  #          fi

  linux-other:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        container:
          - "ubuntu:latest"
          - "fedora:latest"
          - "rockylinux:9"
    #          - "opensuse/leap:latest"

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Test install.sh
        run: |
          set pipefail
          set +e

          # Some images don't have curl installed
          if ! command -v curl &> /dev/null ; then
            if command -v apt &> /dev/null; then
              apt update && apt install -y curl
            fi
          fi

          set -e

          /bin/sh -c "$(curl -fsSL https://sq.io/install.sh)"
          if [ "$(sq version | awk '{print $2}')" != "${{github.ref_name}}" ]; then
            echo "Expected sq ${{github.ref_name}} but got: $(sq version)"
            exit 1
          fi

  alpine:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    container: alpine:latest
    steps:
      - name: Test install
        run: |
          set -e pipefail
          apk add curl
          /bin/sh -c "$(curl -fsSL https://sq.io/install.sh)"
          if [ "$(sq version | awk '{print $2}')" != "${{github.ref_name}}" ]; then
            echo "Expected sq ${{github.ref_name}} but got: $(sq version)"
            exit 1
          fi

  archlinux-pacman:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    container: archlinux:latest
    steps:
      - name: Create non-root user
        run: |
          set -e pipefail

          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm sudo base-devel

          uname="moi"
          useradd $uname
          passwd -d $uname
          printf '%s ALL=(ALL) ALL\n' $uname | tee -a /etc/sudoers
          mkdir -p /home/$uname
          chown -R "$uname:$uname" /home/$uname

      - name: Test install (pacman)
        run: |
          set -e pipefail

          # Run as non-root user
          # sudo -u moi

          # Should be installed via pacman
          sudo -u moi /bin/sh -c "$(curl -fsSL https://sq.io/install.sh)"
          if [ "$(sq version | awk '{print $2}')" != "${{github.ref_name}}" ]; then
            echo "Expected sq ${{github.ref_name}} but got: $(sq version)"
            exit 1
          fi

  archlinux-yay:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    container: archlinux:latest
    steps:
      - name: Create non-root user
        run: |
          set -e pipefail

          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm sudo base-devel

          uname="moi"
          useradd $uname
          passwd -d $uname
          printf '%s ALL=(ALL) ALL\n' $uname | tee -a /etc/sudoers
          mkdir -p /home/$uname
          chown -R "$uname:$uname" /home/$uname

      - name: Install yay
        run: |
          set -e pipefail
          cd /tmp
          curl -sO https://aur.archlinux.org/cgit/aur.git/snapshot/yay-bin.tar.gz
          tar -xf yay-bin.tar.gz
          chmod -R 777 yay-bin
          cd yay-bin
          sudo -u moi makepkg -sri --noconfirm

      - name: Test install (yay)
        run: |
          set -e pipefail

          # Should be installed via yay
          sudo -u moi /bin/sh -c "$(curl -fsSL https://sq.io/install.sh)"
          if [ "$(sq version | awk '{print $2}')" != "${{github.ref_name}}" ]; then
            echo "Expected sq ${{github.ref_name}} but got: $(sq version)"
            exit 1
          fi

  ubuntu-brew:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      # Quiet brew's generic env hints, and skip the pre-install auto-update
      # step (the formula was just tapped, so there's nothing to refresh — this
      # also avoids the untrusted-tap noise brew emits while scanning taps).
      # Note: the "Sandbox unavailable" warning on Linux is inherent to building
      # from source in a container without a bottle, and isn't silenced here.
      HOMEBREW_NO_ENV_HINTS: "1"
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@6eaeff80e7e5c43087c0e5eb5aa82120399e9c91 # master

      - name: Test install via brew
        shell: bash
        run: |
          set -e pipefail
          brew install neilotoole/sq/sq
          if [ "$(sq version | awk '{print $2}')" != "${{github.ref_name}}" ]; then
            echo "Expected sq ${{github.ref_name}} but got: $(sq version)"
            exit 1
          fi

  void-linux:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    container: ghcr.io/void-linux/void-glibc:latest
    steps:
      - name: Test install
        run: |-
          set -e
          (xbps-install -Syu || true) && xbps-install -yu xbps curl
          /bin/sh -c "$(curl -fsSL https://sq.io/install.sh)"
          if [ "$(sq version | awk '{print $1}')" != "sq" ]; then
            # NOTE: The Void package release is a manual process.
            # Thus, the released version will not match this particular
            # workflow release. We'll just do a simple test here.
            echo "FAIL: sq install not working for some reason"
            exit 1
          fi

  windows-scoop:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Test install (scoop)
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"

          scoop bucket add sq https://github.com/neilotoole/sq

          # Install explicitly from our bucket (sq/sq), not the unqualified
          # 'sq': Scoop's community 'main' bucket also carries an 'sq' manifest,
          # and an unqualified install resolves to it (serving an older version).
          # The manifest in our bucket is bumped shortly after the tag is pushed,
          # and this job runs in the same release pipeline, so refresh and retry
          # until the bucket serves the just-released version or we time out.
          # See https://github.com/neilotoole/sq/issues/688.
          $want = "sq $env:GITHUB_REF_NAME"
          $deadline = (Get-Date).AddMinutes(20)
          $ok = $false
          $attempt = 0
          while ((Get-Date) -lt $deadline) {
            $attempt++
            scoop update *> $null
            scoop uninstall sq *> $null
            scoop install sq/sq *> $null
            $got = (sq version | Select-Object -First 1)
            Write-Host "Attempt ${attempt}: got '$got' (want '$want')"
            if ($got -eq $want) { $ok = $true; break }
            Start-Sleep -Seconds 30
          }

          if (-not $ok) {
            Write-Host "Timed out waiting for Scoop to serve $want"
            exit 1
          }
          Write-Host "OK: installed $got"
