services:
  oracle:
    image: ${ORACLE_IMAGE:-sakiladb/oracle:latest}
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -L ${ORACLE_HEALTHCHECK_DSN:-sakila/p_ssW0rd@//localhost:1521/FREEPDB1} @/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: sakila
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../testdata:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d sakila"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
