[build]
publish = "public"
functions = "functions"

[build.environment]
# Pinned releases (not "latest") for security and reproducible, reviewable upgrades.
NODE_VERSION = "22.13.1"
BUN_VERSION = "1.3.13"
HUGO_VERSION = "0.139.2"

[context.production]
command = "bun run build"
# Production publishes to https://sq.io happen via GitHub Actions
# (site-publish-dispatch.yml manual, site-publish-release.yml on stable release).
# Netlify git integration is suppressed so master pushes do not double-deploy.
ignore = "exit 0"

[context.deploy-preview]
command = "bun run build -- -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
command = "bun run build -- -b $DEPLOY_PRIME_URL"

[context.next]
command = "bun run build"

[context.next.environment]
HUGO_ENV = "next"

[[plugins]]
package = "netlify-plugin-submit-sitemap"

[plugins.inputs]
baseUrl = "https://sq.io/"
sitemapPath = "/sitemap.xml"
ignorePeriod = 0
providers = [
  "google",
  "yandex",
]

[[plugins]]
package = "@netlify/plugin-lighthouse"

# optional, fails build when a category is below a threshold
[plugins.inputs.thresholds]
#    performance = 0.9
#    accessibility = 0.9
#    best-practices = 0.9
#    seo = 0.9
#    pwa = 0.9

# optional, deploy the lighthouse report to a path under your site
[plugins.inputs]
output_path = "reports/lighthouse.html"

[dev]
framework = "#custom"
command = "bun run start"
targetPort = 1313
port = 8888
publish = "public"
autoLaunch = false

# Asciicast v2 files are newline-delimited JSON. Netlify only auto-compresses
# responses it treats as compressible text; without this, .cast is served with a
# non-text Content-Type and skips Brotli/gzip (Lighthouse uses-text-compression).
[[headers]]
for = "/casts/*"
[headers.values]
Content-Type = "application/json; charset=utf-8"

# Security headers on all responses. When adding third-party scripts, update CSP
# here and in site/layouts/partials/head/custom-head.html in the same PR.
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-Frame-Options = "SAMEORIGIN"
Referrer-Policy = "strict-origin"
Access-Control-Allow-Origin = "*"
Feature-Policy = "geolocation 'self'"

Content-Security-Policy = '''
      default-src 'self' 'unsafe-inline' sq.io;
      script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' sq.io asciinema.org www.googletagmanager.com cdn.vemetric.com;
      frame-src 'self' 'unsafe-inline' sq.io asciinema.org;
      connect-src 'self' sq.io asciinema.org www.google-analytics.com www.google.com hub.vemetric.com;
      img-src 'self' 'unsafe-inline' data: https: sq.io www.netlify.com;
      style-src 'self' 'unsafe-inline' sq.io www.netlify.com;
      font-src 'self' 'unsafe-inline' sq.io cdnjs.cloudflare.com github.com maxcdn.bootstrapcdn.com themes.googleusercontent.com use.fontawesome.com
      '''

# HTML — revalidate so production deploys are visible immediately.
[[headers]]
for = "/"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/docs/*"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/blog/*"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

# Fingerprinted assets (Hugo pipe/minify hashes) — long cache is safe.
[[headers]]
for = "/js/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.min.*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/fonts/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/version.json"
[headers.values]
Cache-Control = "public, max-age=300"
